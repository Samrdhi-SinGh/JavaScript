<!-- Let's say the restraunt charges a 10% tax. Using the 'cost' variable from 5c, calculate the tax (hint: multipply by 0.1), and save the result in a variable.-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cost of food with 10% tax</title>
</head>
<body>
  <script>
    let cost = 5 + 2 * 3 + 9;
    let cost_after_tax = cost * 0.1;
    console.log(`Cost of food adding tax of 10%: ${cost_after_tax}`);
  </script>
</body>
</html>
