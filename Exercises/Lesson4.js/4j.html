<!-- Continuing from 4i, add onclick="..." attributes to the two buttons:
When clicking 'Add to cart', create a popup with the text 'Added'.
When clicking 'Buy now', display the mesage 'Loading ...' in the Console, and then create a popup with the text 'Purchased'.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset = "UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Use of onclick</title>
  <style>
    .Yellow{
      background-color: yellow;
    }

    .Orange{
      background-color: orange;
    }
  </style>
</head>
<body>
  <p>Adults Plain Cotton T-shirt</p>
  <p>Price: $7.99</p>
  <button class="Yellow" onclick="alert('Added')">Add to cart</button>
  <button class="Orange" onclick="console.log('Loading...'); alert('Purchased')">Buy now</button>
</body>
</html>
