<!--Create 2 buttons 'Add to cart' and 'Buy now'. Use CSS to give them yellow and orange background colors:-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add to cart & Buy now</title>
  <style>
    .Yellow{
      background-color: yellow;
    }

    .Orange{
      background-color: orange;
    }
  </style>
</head>
<body>
  <button class = "Yellow">Add to cart</button>
  <button class="Orange">Buy now</button>
</body>
</html>
