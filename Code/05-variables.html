<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variables in JavaScript</title>
</head>
<body>
  <script>

    // We can use a variable wherever we use a value. Variables are like containers for storing data values. 
    let variables = 3;
    console.log(variables);

    let variables1 = "Hello";
    console.log(variables1);

    let calculation = 2 + 2;
    console.log(calculation);
    console.log(calculation + 2);

    console.log(variables + variables1);
    console.log("Hello" + calculation);

    let result = calculation + variables1;
    console.log(result);

    let result1 = calculation + 3;
    console.log(result1);

    let calculation1 = calculation * 2;
    console.log(calculation1);

    let message = "Hey there!";
    console.log(message); console.log(';'); // ';' will be printed on the next line.

    console.log(message + variables1);

    //Assign and re-assign of value:
    let assign = "Assigning a value to a variable.";
    console.log(assign);

    assign = "Re-assigning a value to a variable.";
    console.log(assign);

    variables = variables + 1;
    console.log(variables);

    console.log(typeof 3);

    console.log(typeof variables);
    console.log(typeof message);
     
  </script>
</body>
</html>
