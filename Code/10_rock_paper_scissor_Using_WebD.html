<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock, Paper, Scissor</title>

  <style>
    body{
      font-family: Arial;
      background-color: black;
      color: white;
    }

    .heading{
      font-weight: bold;
      font-size: 30px;
    }

    img{
      height: 50px;
    }

    .js-emojis{
      width: 120px;
      height: 120px;
      background: transparent;
      border-radius: 100px;
      border: 3px solid white;
      margin-right: 10px;
      cursor: pointer;
    }

    .result{
      font-size:25px;
      font-weight: bold;
      margin-top: 50px;
    }

    .score{
      margin-top: 60px;
    }

    .js-reset-button{
      background-color: white;
      padding: 8px 12px;
      border: none;
      font-size: 14px;
    }

  </style>
</head>

<body>
  <p class="heading">Rock Paper Scissors</p>

  <button onclick="playGame('Rock');" class="js-emojis"><img src="../Images/Rock-emoji.png" alt="Rock"></button>

  <button onclick="playGame('Paper');" class="js-emojis"><img src="../Images/Paper-emoji.png" alt="Paper"></button>

  <button onclick="playGame('Scissor');" class="js-emojis"><img src="../Images/Scissor-emoji.png" alt="Scissor"></button>


  <p class="js-result result"></p>
  <p class="js-move"></p>
  <p class="js-score score"></p>

  <button onclick="
  score.wins = 0;
  score.loses = 0;
  score.ties = 0;
  localStorage.removeItem('score');//As we reset and refresh and play again, the score is already removed and there is nothing but 'null' stored so it will give an error: 'Cannot read properties of null (reading 'wins') at playGame'
  updateScore();" class="js-reset-button">
  Reset Score</button>

  <script> //The reason to created the function in script element is that remember the script element runs when the page is loaded so we wanna make sure that the function is created first and then we use it in the button after. And as we have created the function in script element, we just have to call the function in the button instead of repeating the whole code.

    let score = JSON.parse(localStorage.getItem('score')) || {
      wins: 0,
      loses: 0,
      ties: 0
    }; // So, if JSON.parse is truthy it'll be displayed else the seond option.

    /*
    // if (score === null) {//We can also do !score
    if(!score){
     score = {
        wins: 0,
          loses: 0,
            ties: 0
      }
    }*/

    updateScore();

    //  console.log(localStorage.getItem('message'));
    function playGame(playerMove) {
      //Computer Move:
      const computerMove = pickComputerMove();

      let result = '';

      // To compare the computerMove and the user's move
      if (playerMove === 'Rock') {
        if (computerMove === 'Rock') {
          result = 'Tie';
        }
        else if (computerMove === 'Paper') {
          result = 'You lose';
        }
        else if (computerMove === 'Scissor') {
          result = 'You win';
        }
      }
      else if (playerMove === 'Paper') {
        if (computerMove === 'Rock') {
          result = 'You win';
        }
        else if (computerMove === 'Paper') {
          result = 'Tie';
        }
        else if (computerMove === 'Scissor') {
          result = 'You lose';
        }
      }
      else if (playerMove === 'Scissor') {
        if (computerMove === 'Rock') {
          result = 'You lose';
        }
        else if (computerMove === 'Paper') {
          result = 'You win';
        }
        else if (computerMove === 'Scissor') {
          result = 'Tie';
        }
      }

      console.log(result);
      if (result === 'You win') {
        score.wins += 1;
      }
      else if (result === 'You lose') {
        score.loses += 1;
      }
      else if (result === 'Tie') {
        score.ties += 1;
      }

      // localStorage.setItem('message', 'hello');

      localStorage.setItem('score', JSON.stringify(score));

      updateScore();

      document.querySelector('.js-result').innerHTML = `${result}`;

      document.querySelector('.js-move').innerHTML = `
      You <img src="../Images/${playerMove}-emoji.png" alt="playerMove"> <img src="../Images/${computerMove}-emoji.png" alt="computerMove"> Computer`;
    };


    function updateScore() {
      document.querySelector('.js-score')
       .innerHTML = `Wins: ${score.wins}, Loses: ${score.loses}, Ties: ${score.ties}`;
    };


    // let computerMove = ''; // Global variable

    function pickComputerMove() { //This code only creates the function, to run this function, we have to call it in buttons.

      //Computer move:
      let computerMove = '';

      const randomNumber = Math.random() //This wiil generate random numbers between 0 and 1

      if (randomNumber >= 0 && randomNumber <= 1 / 3) {
        computerMove = 'Rock';
      }
      else if (randomNumber >= 1 / 3 && randomNumber <= 2 / 3) {
        computerMove = 'Paper';
      }
      else if (randomNumber >= 2 / 3 && randomNumber <= 1) {
        computerMove = 'Scissor';
      }

      console.log(computerMove);
      // To compare the computerMove and the user's move

      return computerMove; //It returns the computerMove out of the function so the computerMove will not be undeclared and out of the scope on function, then as we have made the const computerMove() that will be the same name inside 'result' conditions so it matches it and takes the value and compares it.  
    }
  </script>
</body>

</html>
