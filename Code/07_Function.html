    //Parameter:
    
    function calculation(cost){//This function takes a parameter
      console.log(cost * 0.1);
    }

    //calculation(parameter1);
    calculation(2000);// 2000*0.1 = 200
    calculation(8000);//8000*0.1 = 800

    //More than one parameters:
    function fun(parameter1, parameter2){
      console.log(parameter1 + parameter2);
    }
    fun(2,3);//5 as parameter1 = argument1 & parameter2 = argument2
    
  </script>
