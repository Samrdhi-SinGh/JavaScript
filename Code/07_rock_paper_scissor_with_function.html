<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock, Paper, Scissor</title>
</head>

<body>
  <p>Rock Paper Scissor</p>

  <button onclick="
  //Computer Move:
  const computerMove = pickComputerMove();

  // To compare the computerMove and the user's move
  let result = ''; 
  if(computerMove === 'Rock'){
    result = 'Tie';
  }
  else if(computerMove === 'Paper'){
    result = 'You lose';
  }
  else if(computerMove === 'Scissor'){
    result = 'You win';
  }
  console.log(result);
  alert(`You picked Rock. Computer picked ${computerMove}. ${result}`);
  ">
    Rock</button>

  <button onclick="
   //Computer Move:
  const computerMove = pickComputerMove();

  // To compare the computerMove and the user's move
  let result = ''; 
  if(computerMove === 'Rock'){
    result = 'You win';
  }
  else if(computerMove === 'Paper'){
    result = 'Tie';
  }
  else if(computerMove === 'Scissor'){
    result = 'You lose';
  }
  console.log(result);
  alert(`You picked Paper. Computer picked ${computerMove}. ${result}`);
  ">
    Paper</button>

  <button onclick="
   
   //Computer Move:
  const computerMove = pickComputerMove();
  
  // To compare the computerMove and the user's move
  let result = ''; 
  if(computerMove === 'Rock'){
    result = 'You lose';
  }
  else if(computerMove === 'Paper'){
    result = 'You win';
  }
  else if(computerMove === 'Scissor'){
    result = 'Tie';
  }
  console.log(result);
  alert(`You picked Scissor. Computer picked ${computerMove}. ${result}`);
  ">
    Scissor</button>

  <script> //The reason to created the function in script element is that remember the script element runs when the page is loaded so we wanna make sure that the function is created first and then we use it in the button after. And as we have created the function in script element, we just have to call the function in the button instead of repeating the whole code.

    // let computerMove = ''; // Global variable

    function pickComputerMove() { //This code only creates the function, to run this function, we have to call it in buttons.

      //Computer move:
      let computerMove = '';

      const randomNumber = Math.random() //This wiil generate random numbers between 0 and 1

      if (randomNumber >= 0 && randomNumber <= 1 / 3) {
        computerMove = 'Rock';
      }
      else if (randomNumber >= 1 / 3 && randomNumber <= 2 / 3) {
        computerMove = 'Paper';
      }
      else if (randomNumber >= 2 / 3 && randomNumber <= 1) {
        computerMove = 'Scissor';
      }

      console.log(computerMove);
      // To compare the computerMove and the user's move

      return computerMove; //It returns the computerMove out of the function so the computerMove will not be undeclared and out of the scope on function, then as we have made the const computerMove() that will be the same name inside 'result' conditions so it matches it and takes the value and compares it.  
    }
  </script>
</body>

</html>
